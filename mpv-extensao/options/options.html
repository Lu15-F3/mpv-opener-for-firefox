<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <h1 id="title-settings">MPV Opener Settings</h1>
    
    <div class="section">
      <h2 id="header-playback">Playback Settings</h2>
      <div class="form-group">
        <label id="label-display" for="displayMode">Display Mode:</label>
        <select id="displayMode">
          <option value="standard" id="opt-standard">Standard Window</option>
          <option value="fullscreen" id="opt-fullscreen">Fullscreen</option>
          <option value="pip" id="opt-pip">Picture-in-Picture (Bottom Right)</option>
        </select>
      </div>
      <div class="form-group">
        <label id="label-state" for="initialState">Initial State:</label>
        <select id="initialState">
          <option value="playing" id="opt-playing">Playing</option>
          <option value="paused" id="opt-paused">Paused</option>
        </select>
      </div>
    </div>

    <div class="section">
      <h2 id="header-quality">Quality & Stream Filters</h2>
      <div class="form-group">
        <label id="label-maxResolution" for="maxResolution">Maximum Stream Resolution:</label>
        <select id="maxResolution">
          <option value="best">Best Quality Disponible</option>
          <option value="1080">1080p Full HD</option>
          <option value="720">720p HD</option>
          <option value="480">480p SD</option>
        </select>
      </div>
      <div class="checkbox-group">
        <input type="checkbox" id="autoSubtitles">
        <label for="autoSubtitles" id="label-autoSubtitles">Automatically load embedded and auto-generated subtitles</label>
      </div>
    </div>

    <div class="section">
      <h2 id="header-fedora">Fedora & KDE Plasma Integration</h2>
      <div class="checkbox-group">
        <input type="checkbox" id="inhibitSleep" checked>
        <label for="inhibitSleep" id="label-inhibitSleep">Inhibit screensaver and system sleep during playback</label>
      </div>
      <div class="checkbox-group">
        <input type="checkbox" id="aggressiveCache">
        <label for="aggressiveCache" id="label-aggressiveCache">Enable aggressive network cache (Prevents stream buffering)</label>
      </div>
    </div>

    <div class="section">
      <h2 id="header-window">Window Behavior</h2>
      <div class="checkbox-group">
        <input type="checkbox" id="alwaysOnTop">
        <label for="alwaysOnTop" id="label-alwaysOnTop">Keep mpv window always on top</label>
      </div>
    </div>

    <div class="section">
      <h2 id="header-audio">Audio Device Configuration</h2>
      <div class="form-group-vertical">
        <label id="label-audioDevice" for="audioDevice">Default Audio Output Device (mpv --audio-device)</label>
        <input type="text" id="audioDevice" placeholder="e.g., alsa/hdmi, pulse/device_name">
      </div>
    </div>

    <div class="section">
      <h2 id="header-tab">Tab Behavior</h2>
      <div class="checkbox-group">
        <input type="checkbox" id="closeTab">
        <label for="closeTab" id="label-close">Close tab automatically after sending video to mpv</label>
      </div>
    </div>

    <button id="save-btn" class="btn-save">Save Settings</button>
    <div id="status" class="status-msg"></div>
  </div>
  <script src="options.js"></script>
</body>
</html>
